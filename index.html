<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PodZone</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>

body {

    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;

}


/* TOPO */

header {

    text-align: center;
    padding: 35px 20px;

}


.logo {

    width: 150px;

}


.logo-text {

    font-size: 55px;
    font-weight: bold;
    letter-spacing: 8px;

    background: linear-gradient(
        180deg,
        #fff2a8,
        #d4af37,
        #8a6a00
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

}


header p {

    color: #d4af37;
    font-size: 18px;

}



/* VITRINE */

.container {

    text-align: center;
    padding: 20px;

}



.produto {

    background: #111;

    padding: 15px;

    margin: 15px;

    width: 220px;

    border-radius: 15px;

    display: inline-block;

    vertical-align: top;

}



.produto img {

    width: 100%;

    height: 220px;

    object-fit: contain;

}



.produto h2 {

    color: #d4af37;

}



select {

    width: 95%;

    padding: 10px;

    border-radius: 8px;

    margin: 10px;

}



/* BOTÕES */


.botao {

    display: block;

    margin: 12px auto;

    padding: 12px;

    border-radius: 10px;

    text-decoration: none;

    font-weight: bold;

    color: #000;

}



.whatsapp,
.instagram {


    background: linear-gradient(
        135deg,
        #d4af37,
        #f5f5f5,
        #b8860b
    );


}



.botao i {

    margin-right: 8px;

}



/* ESCONDER DETALHES */

.detalhes {

    display:none;

}



/* RODAPÉ */

footer {

    text-align:center;

    padding:20px;

    color:#888;

}



</style>


</head>


<body>


<header>


<img 
src="0C425A9F-032A-4798-B3DF-47E8A5E23C3A.png"
class="logo">


<h1 class="logo-text">

POD ZONE

</h1>


<p>

QUALIDADE • ESTILO • PODZONE

</p>


</header>



<div class="container">


<h2>

Produtos

</h2>



<div class="produto" onclick="abrirProduto()">



<img 
src="FEE94CF7-D277-4C39-93B1-54827C90ADE1.png">


<h2>

IGNITE V80

</h2>



<h2>

R$ 90,00

</h2>



<div class="detalhes" id="detalhes">


<p>

Escolha o sabor:

</p>



<select>

<option>FROZEN WATERMELON</option>

<option>FROZEN MINT WATER</option>

<option>FROZEN BLUEBERRY</option>

<option>FROZEN COLA</option>

<option>FROZEN STRAWBERRY</option>

</select>




<a class="botao whatsapp"
href="https://wa.me/5511993554907">

<i class="fa-brands fa-whatsapp"></i>

Comprar pelo WhatsApp

</a>


</div>


</div>




<a class="botao instagram"

href="https://www.instagram.com/podzone.oficial_/"
target="_blank">


<i class="fa-brands fa-instagram"></i>

@podzone.oficial_

</a>



<footer>

© 2026 PodZone

</footer>



<script>


function abrirProduto(){

document.getElementById("detalhes").style.display="block";

}


</script>



</body>

</html>
