<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PodZone</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px 20px;
      background: #000;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    .container {
      padding: 30px 20px;
    }

    .botao {
      display: block;
      max-width: 300px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      background: #222;
      border: 1px solid #555;
    }

    .instagram {
      background: #E1306C;
    }

    .whatsapp {
      background: #25D366;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: #000;
      font-size: 14px;
    }

</head>

<body>

<header>
  <h1>PodZone</h1>
  <p>Pods e acessórios</p>
</header>

<div class="container">

  <h2>Bem-vindo à nossa loja!</h2>

  <p>
    Encontre os melhores produtos com qualidade e confiança.
  </p>

  <a class="botao instagram" 
     href="https://www.instagram.com/podzone.oficial_/" 
     target="_blank">
    📷 Instagram @podzone.oficial_
  </a>

  <a class="botao whatsapp" 
     href="https://wa.me/" 
     target="_blank">

<footer>
  © 2026 PodZone - Todos os direitos reservados
</footer>

</html>
