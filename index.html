<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pod Zone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:#fff;
}

header{
    background:#ff7a00;
    padding:20px;
    text-align:center;
}

header h1{
    font-size:32px;
}

header p{
    margin-top:8px;
}

.busca{
    padding:20px;
}

.busca input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.produtos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1d1d1d;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,.4);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    margin:15px 10px 5px;
}

.preco{
    color:#ff9800;
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.botao{
    display:block;
    background:#25D366;
    color:white;
    text-decoration:none;
    padding:14px;
    margin:15px;
    border-radius:10px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#999;
}
</style>

</head>

<body>

<header>
<h1>POD ZONE</h1>
<p>Os melhores pods com qualidade e confiança.</p>
</header>

<div style="text-align:center; margin:20px;">
  <a href="https://instagram.com/podzone.oficial_" target="_blank" style="background:#E1306C; color:white; text-decoration:none; padding:15px 25px; border-radius:10px; font-size:18px; display:inline-block;">
    📸 Siga a @podzone.oficial_
  </a>
</div>

<div class="busca">
<input type="text" placeholder="🔍 Pesquisar produtos">
</div>

<div class="produtos">

<div class="card">
<img src="https://picsum.photos/400/400?1" alt="Produto">
<h3>Pod Ignite V80</h3>
<p class="preco">R$ 89,90</p>

<a class="botao"
href="https://wa.me/5511993554907?text=Olá! Quero comprar o Pod Ignite V80">
Comprar pelo WhatsApp
</a>

</div>

<div class="card">

<img src="https://picsum.photos/400/400?2" alt="Produto">

<h3>Pod XROS 4</h3>

<p class="preco">R$ 119,90</p>

<a class="botao"
href="https://wa.me/5511993554907?text=Olá! Quero comprar o Pod XROS 4">
Comprar pelo WhatsApp
</a>

</div>

</div>

<footer>
© 2026 Pod Zone
</footer>

</body>
</html>
