<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PodZone</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
}


/* CABEÇALHO */

header {
    text-align: center;
    padding: 30px 20px;
}


.logo {
    width: 160px;
    cursor: pointer;
}


.logo-text {

    font-size: 50px;
    font-weight: bold;
    letter-spacing: 5px;

    background: linear-gradient(
        180deg,
        #fff2a8,
        #d4af37,
        #8a6a00
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

}


/* FRASE */

.slogan {
    color: #d4af37;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    text-align: center;
    margin-top: 8px;
}

/* PRODUTOS */

.container {

    text-align: center;
    padding: 20px;
    
}

.lista-produtos {

    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;

}


.produto {

    width: 100%;

    cursor: pointer;

}


.produto img {

    width: 100%;
    height: 160px;
    object-fit: contain;

}



.produto h2 {

    color: #d4af37;

    font-size: 20px;

}


.produto p {

    color: #ddd;

}


/* BOTÕES */

.botao {

    display: inline-block;

    padding: 12px 20px;

    border-radius: 8px;

    text-decoration: none;

    font-weight: bold;

    margin: 10px;

}



.contato {

    background: linear-gradient(
        135deg,
        #d4af37,
        #eeeeee
    );

    color: black;

}



/* INSTAGRAM */

footer {

    text-align: center;

    padding: 30px;

}

.logo {
    width: 160px;
}


.beneficios {

    text-align: center;
    color: #ddd;
    font-size: 12px;
    line-height: 1.5;
    margin-top: 10px;

}

.beneficios p {

    margin: 3px 0;

}

.produto {
    background: #1b1b1b;
    border-radius: 18px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 6px 15px rgba(0,0,0,0.25);
    transition: all 0.3s ease;
}

.produto:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.4);
}

.produto img {
    width: 100%;
    border-radius: 12px;
    transition: transform 0.3s ease;
}

.produto:hover img {
    transform: scale(1.05);
}

.produto h2 {
    color: #fff;
    font-size: 20px;
    margin: 15px 0 8px;
}

.produto p {
    color: #FFD700;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);

}

/* BANNERS */

.carrossel {
    width: 100%;
    overflow: hidden;
}

.carrossel img {
    width: 100%;
    height: 300px;
    object-fit: contain;
    display: block;
}

    0% {
        transform: translateX(0);
    }

    25% {
        transform: translateX(0);
    }

    30% {
        transform: translateX(-25%);
    }

    55% {
        transform: translateX(-25%);
    }

    60% {
        transform: translateX(-50%);
    }

    85% {
        transform: translateX(-50%);
    }

    90% {
        transform: translateX(-75%);
    }

    100% {
        transform: translateX(-75%);
    }

}

/* ===== BARRA DE PESQUISA ===== */

.pesquisa {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin: 30px auto;
    text-align: center;
}

.pesquisa input {
    display: block;
    margin: 0 auto;
    width: 80%;
    max-width: 320px;
    padding: 12px 16px;
    background: #111;
    color: #fff;
    border: 2px solid #FFD700;
    border-radius: 50px;
    font-size: 15px;
    outline: none;
    transition: 0.3s;
    box-sizing: border-box;
}

.pesquisa input::placeholder {
    color: #aaa;
}

.pesquisa input:focus {
    border-color: #FFD700;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    transform: scale(1.02);
}

</style>

</head>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const buscar = document.getElementById("buscar");
    const produtos = document.querySelectorAll(".produto");

    buscar.addEventListener("input", function () {

        const filtro = buscar.value.toLowerCase();

        produtos.forEach(function(produto) {

            const texto = produto.textContent.toLowerCase();

            if (texto.includes(filtro)) {
                produto.style.display = "block";
            } else {
                produto.style.display = "none";
            }

        });

    });

});
</script>
